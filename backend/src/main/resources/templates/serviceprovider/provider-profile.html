<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Provider Profile | FindMyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .profile-container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            animation: slideUpFade 0.8s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
            font-size: 1.6rem;
        }

        form label {
            display: block;
            margin-bottom: 18px;
            color: #555;
            font-weight: 500;
            font-size: 1rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus,
        select:focus {
            border-color: #ff6f61;
            outline: none;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background-color: #ff6f61;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #e65b50;
            transform: scale(1.05);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2>Edit Service Details</h2>
        <form th:action="@{/provider/update}" method="post">
            <input type="hidden" th:value="${provider.id}" name="id" />
            <label>
                Service Name:
                <input type="text" name="name" th:value="${provider.name}" required />
            </label>

            <label>
                Category:
                <select name="category" required>
                    <option disabled value="">Select category</option>
                    <option th:each="cat : ${categories}" 
                            th:value="${cat.name}" 
                            th:text="${cat.name}" 
                            th:selected="${cat.name == provider.category}">
                    </option>
                </select>
            </label>

            <label>
                Price:
                <input type="number" name="price" th:value="${provider.price}" min="0" step="0.01" required />
            </label>

            <button type="submit">Update</button>
        </form>
    </div>
</body>
</html>
