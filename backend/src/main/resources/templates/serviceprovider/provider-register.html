<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Service Provider</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            animation: slideFade 0.6s ease-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 10px;
            border: 1.8px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: #74ebd5;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #4b79a1;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: #39527f;
            transform: scale(1.03);
        }

        @keyframes slideFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .form-container {
                padding: 30px 20px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Service Provider Registration</h2>
    <form th:action="@{/provider/register}" method="post" th:object="${provider}">
        <label>Name:</label>
        <input type="text" th:field="*{name}" placeholder="Your Name" required />

        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Your Email" required />

        <label>Password:</label>
        <input type="password" th:field="*{password}" placeholder="Create Password" required />

        <label>Phone:</label>
        <input type="text" name="phone" placeholder="Phone Number" required />

        <label>City:</label>
        <input type="text" name="place" placeholder="Your City" required />

        <label>Category:</label>
        <input type="text" name="categoryName" placeholder="e.g., Electrician" required />

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
