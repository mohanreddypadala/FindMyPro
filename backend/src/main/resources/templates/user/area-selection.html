<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Area - FindMyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d9a7c7 0%, #fffcdc 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .area-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d2d2d;
            font-size: 28px;
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .search-group {
            position: relative;
        }

        .search-group input {
            width: 100%;
            padding: 14px 16px 14px 16px;
            font-size: 1rem;
            border: 1.8px solid #ccc;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fff;
        }

        .search-group input:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.1);
            outline: none;
        }

        .search-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        select {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border-radius: 12px;
            border: 1.8px solid #ccc;
            background: #fff;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.1);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #007bff, #0056d2);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #0056d2, #003399);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        button i {
            animation: floatArrow 2s infinite ease-in-out;
        }

        @keyframes floatArrow {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        @media (max-width: 500px) {
            .area-container {
                margin: 0 20px;
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="area-container">
        <h2>Select Your Area</h2>
        <form th:action="@{/user/select-area}" method="post">
            <div class="input-wrapper">
                <!-- Search Input -->
                <div class="search-group">
                    <input type="text" id="areaSearch" placeholder="Search your area..." onkeyup="filterAreas()" />
                    <i class="fas fa-search"></i>
                </div>

                <!-- Dropdown -->
                <select name="areaId" id="areaDropdown" required>
                    <option value="" disabled selected>Select your area</option>
                    <option th:each="area : ${areas}" th:value="${area.id}" th:text="${area.name}"></option>
                </select>
            </div>

            <!-- Continue Button -->
            <button type="submit">
                Continue <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        function filterAreas() {
            const input = document.getElementById('areaSearch').value.toLowerCase();
            const dropdown = document.getElementById('areaDropdown');
            const options = dropdown.getElementsByTagName('option');

            for (let i = 0; i < options.length; i++) {
                const text = options[i].textContent.toLowerCase();
                if (i === 0 || text.includes(input)) {
                    options[i].style.display = "";
                } else {
                    options[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
