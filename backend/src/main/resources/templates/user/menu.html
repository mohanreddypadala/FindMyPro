<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Menu</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <h1>Welcome, <span th:text="${user.name}">User</span></h1>
    <h2>Select a Service Category</h2>
    <form th:action="@{/user/services}" method="get">
        <select name="category" required>
            <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
        </select>
        <button type="submit">Find Professionals</button>
    </form>
    <a th:href="@{/user/profile}">Profile</a> | <a th:href="@{/logout}">Logout</a>
</body>
</html>
