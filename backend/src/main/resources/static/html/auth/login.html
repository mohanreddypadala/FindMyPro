<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyPro - Login</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1 id="login-title">Login</h1>
            <div class="user-type-toggle">
                <button class="toggle-btn active" id="customerBtn">Customer</button>
                <button class="toggle-btn" id="providerBtn">Service Provider</button>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="/html/auth/register.html" id="register-link">Register here</a></p>
            <p><a href="/html/auth/forgot-password.html">Forgot password?</a></p>
        </div>
    </div>

    <script>
        // Toggle between customer/provider login
        const customerBtn = document.getElementById('customerBtn');
        const providerBtn = document.getElementById('providerBtn');
        
        customerBtn.addEventListener('click', () => {
            customerBtn.classList.add('active');
            providerBtn.classList.remove('active');
        });
        
        providerBtn.addEventListener('click', () => {
            providerBtn.classList.add('active');
            customerBtn.classList.remove('active');
        });

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const isProvider = providerBtn.classList.contains('active');
            
            try {
                // Show loading state
                const submitBtn = document.querySelector('.submit-btn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Logging in...';
                
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: isProvider ? 'PROVIDER' : 'USER'
                    })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // Redirect based on user type
                    if (user.role === 'USER') {
                        window.location.href = '/html/customer/dashboard.html';
                    } else {
                        window.location.href = '/html/provider/dashboard.html';
                    }
                } else {
                    const error = await response.text();
                    showError(error || 'Invalid username or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
        
        function showError(message) {
            const errorElement = document.createElement('div');
            errorElement.className = 'error-message';
            errorElement.textContent = message;
            
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }
            
            document.getElementById('loginForm').prepend(errorElement);
        }
    </script>
</body>
</html>
