<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyPro - Register</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <div class="user-type-toggle">
                <button class="toggle-btn active" id="customerBtn">Customer</button>
                <button class="toggle-btn" id="providerBtn">Service Provider</button>
            </div>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username*</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email*</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="password">Password* (min 8 characters)</label>
                <input type="password" id="password" name="password" minlength="8" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password*</label>
                <input type="password" id="confirmPassword" name="confirmPassword" minlength="8" required>
            </div>
            <button type="submit" class="submit-btn">Register</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="/html/auth/login.html">Login here</a></p>
        </div>
    </div>

    <script>
        // Toggle between customer/provider registration
        const customerBtn = document.getElementById('customerBtn');
        const providerBtn = document.getElementById('providerBtn');
        
        customerBtn.addEventListener('click', () => {
            customerBtn.classList.add('active');
            providerBtn.classList.remove('active');
        });
        
        providerBtn.addEventListener('click', () => {
            providerBtn.classList.add('active');
            customerBtn.classList.remove('active');
        });

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const isProvider = providerBtn.classList.contains('active');
            
            // Client-side validation
            if (password !== confirmPassword) {
                showError("Passwords don't match");
                return;
            }
            
            if (password.length < 8) {
                showError("Password must be at least 8 characters");
                return;
            }

            try {
                // Show loading state
                const submitBtn = document.querySelector('.submit-btn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Registering...';
                
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        email: email,
                        phone: phone,
                        role: isProvider ? 'PROVIDER' : 'USER'
                    })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    alert('Registration successful! Please login.');
                    window.location.href = '/html/auth/login.html';
                } else {
                    const error = await response.text();
                    showError(error || 'Registration failed');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('Network error. Please try again.');
            } finally {
                const submitBtn = document.querySelector('.submit-btn');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
        
        function showError(message) {
            const errorElement = document.createElement('div');
            errorElement.className = 'error-message';
            errorElement.textContent = message;
            
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }
            
            document.getElementById('registerForm').prepend(errorElement);
        }
    </script>
</body>
</html>
